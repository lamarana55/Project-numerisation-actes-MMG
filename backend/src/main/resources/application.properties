spring.application.name=backend
server.port=${SERVER_PORT}
server.servlet.context-path=/api/v1
app.front.url=${FRONT_URL}

#Pour la configuration du fichier .env
spring.config.import=optional:file:.env[.properties]

#Pour la compression HTTP
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/css,text/scss,text/plain,application/javascript,application/json
server.compression.min-response-size=1024

###########-----Postgres-----------############
spring.datasource.url=jdbc:postgresql://${DATABASE_IP}:${DATABASE_PORT}/${DATABASE}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
# Le schéma est désormais géré par Flyway ; Hibernate se contente de valider.
# DDL_AUTO reste surchargeable par variable d'env mais doit rester 'validate' en temps normal.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.datasource.driver-class-name=org.postgresql.Driver

###########-----END Postgres-----------############

###########-----Flyway (migrations versionnées)-----------############
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Historique DÉDIÉ au backend RAVEC — distinct de flyway_schema_history utilisé
# par le microservice GenerationNPI, afin de cohabiter sur la base partagée.
spring.flyway.table=flyway_schema_history_ravec
# Bases déjà existantes (créées par Hibernate) : marquées comme baseline V1,
# la V1 n'est donc PAS rejouée dessus ; elle ne s'exécute que sur une base vierge.
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Baseline schema RAVEC
###########-----END Flyway-----------############

#######File config############################
spring.datasource.hikari.connection-timeout=100000
spring.datasource.hikari.maximum-pool-size=20

spring.http.multipart.enabled=true
spring.http.multipart.file-size-threshold=200KB
#spring.http.multipart.max-file-size=500MB
#spring.http.multipart.max-request-size=500MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

###############----Email configuration Local and prod---###################
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.smtp.debug=true

spring.mail.protocol=smtp
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}

# ========== ACTUATOR / MONITORING ==========
# prometheus + metrics ajoutés pour Prometheus/Grafana (scrape interne au réseau
# Docker uniquement — le backend n'est PAS exposé sur l'hôte).
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.endpoint.loggers.enabled=false
# Exclure le mail du health check
management.health.mail.enabled=false
# Étiquette commune sur toutes les métriques (filtrage Grafana)
management.metrics.tags.application=pn-ravec
management.prometheus.metrics.export.enabled=true

# ========== INFO APP ==========
info.app.name=ProjetNPI
info.app.description=Projet de simulation du NPI  
info.app.version=1.0.0

# ========== LOGS ==========
logging.level.root=INFO
logging.level.gov.ravec.backend=DEBUG
logging.file.name=logs/ravec-backend.log
logging.file.max-size=10MB
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n



