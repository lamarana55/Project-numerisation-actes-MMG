spring.application.name=backend
server.port=${SERVER_PORT}
server.servlet.context-path=/api/v1
app.front.url=${FRONT_URL}

#Pour la configuration du fichier .env
spring.config.import=optional:file:.env[.properties]

#Pour la compression HTTP
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/css,text/scss,text/plain,application/javascript,application/json
server.compression.min-response-size=1024

###########-----Postgres-----------############
spring.datasource.url=jdbc:postgresql://${DATABASE_IP}:${DATABASE_PORT}/${DATABASE}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO}
spring.jpa.show-sql=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.datasource.driver-class-name=org.postgresql.Driver

###########-----END Postgres-----------############

#######File config############################
spring.datasource.hikari.connection-timeout=100000
spring.datasource.hikari.maximum-pool-size=20

spring.http.multipart.enabled=true
spring.http.multipart.file-size-threshold=200KB
#spring.http.multipart.max-file-size=500MB
#spring.http.multipart.max-request-size=500MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

###############----Email configuration Local and prod---###################
