name: CD — Build, Scan & Deploy

# Déclenché uniquement sur main. Le développeur ne fait que `git push origin main`.
on:
  push:
    branches:
      - main

# Un seul déploiement à la fois (pas d'annulation : on ne coupe pas un deploy en cours).
concurrency:
  group: cd-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  # ⚠️ Namespace GHCR en MINUSCULES (obligatoire) — corrige le bug de casse Lamarana55.
  BACKEND_IMAGE: ghcr.io/lamarana55/ravec-backend
  FRONTEND_IMAGE: ghcr.io/lamarana55/ravec-frontend

jobs:
  # ════════════════════════════════════════════════════════════════════════
  #  1) TESTS — barrière qualité avant tout déploiement
  # ════════════════════════════════════════════════════════════════════════
  test-backend:
    name: Tests backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ravec_test
          POSTGRES_USER: ravec_user
          POSTGRES_PASSWORD: ravec_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Tests
        working-directory: ./backend
        env:
          DATABASE_IP: localhost
          DATABASE_PORT: 5432
          DATABASE: ravec_test
          DATABASE_USER: ravec_user
          DATABASE_PASSWORD: ravec_test_pass
          DDL_AUTO: create-drop
          # Flyway désactivé en test (base vierge gérée par Hibernate ; le baseline
          # pg_dump n'est rejouable que sur la base de production existante).
          SPRING_FLYWAY_ENABLED: false
          JWT_SECURITY: ci_test_jwt_secret_key_32chars_minimum_xx
          SERVER_PORT: 8091
          FRONT_URL: http://localhost:4200
          SPRING_MAIL_USERNAME: test@test.com
          SPRING_MAIL_PASSWORD: test
        run: mvn -B --no-transfer-progress clean test

  test-frontend:
    name: Tests frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
        working-directory: ./frontend
      # Tests unitaires non bloquants (specs CLI par défaut) ; le build de
      # production ci-dessous est le véritable garde-fou avant déploiement.
      - name: Tests unitaires (non bloquant)
        working-directory: ./frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless --no-progress || echo "::warning::Tests unitaires frontend en échec (non bloquant)"
      - name: Build production (bloquant)
        working-directory: ./frontend
        run: npm run build -- --configuration production

  # ════════════════════════════════════════════════════════════════════════
  #  2) BUILD + SCAN + PUSH (par image, en parallèle)
  # ════════════════════════════════════════════════════════════════════════
  build:
    name: Build, scan & push (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    permissions:
      contents: read
      packages: write
      security-events: write    # upload SARIF Trivy
    strategy:
      fail-fast: true
      matrix:
        include:
          - name: backend
            image: ghcr.io/lamarana55/ravec-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: frontend
            image: ghcr.io/lamarana55/ravec-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.prod
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Login avec un PAT (GHCR_TOKEN, scope write:packages). Comme le PAT
      # appartient au propriétaire des packages, le push fonctionne même si les
      # packages ne sont pas liés au dépôt (évite le 403 du GITHUB_TOKEN).
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USER || github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # Build local (load) pour pouvoir scanner AVANT de publier.
      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ matrix.image }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Scan de vulnérabilités (Trivy)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ matrix.image }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.name }}.sarif
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'   # rapport seulement (non bloquant) — passer à '1' pour bloquer sur CRITICAL/HIGH

      - name: Publier le rapport Trivy (onglet Security)
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

      # Publication : tags sha-<commit> (déterministe) + latest (commodité).
      - name: Push image (sha + latest)
        run: |
          docker tag ${{ matrix.image }}:sha-${{ github.sha }} ${{ matrix.image }}:latest
          docker push ${{ matrix.image }}:sha-${{ github.sha }}
          docker push ${{ matrix.image }}:latest

  # ════════════════════════════════════════════════════════════════════════
  #  3) DEPLOY — par SHA, avec backup + healthcheck + rollback auto
  # ════════════════════════════════════════════════════════════════════════
  deploy:
    name: Déploiement production (self-hosted)
    # Runner self-hosted installé SUR le serveur de prod (réseau privé).
    # Le déploiement est LOCAL : aucun SSH, rien d'exposé sur Internet.
    runs-on: [self-hosted, ravec-prod]
    needs: build
    environment: production
    env:
      APP_DIR: /opt/pn-ravec
      SHA: ${{ github.sha }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      GHCR_USER: ${{ secrets.GHCR_USER || github.actor }}
    steps:
      - uses: actions/checkout@v4

      - name: Déploiement local
        run: |
          set -euo pipefail

          # 0) Synchroniser compose + scripts ops vers le dossier applicatif
          #    ($APP_DIR contient le .env de prod, jamais versionné).
          mkdir -p "$APP_DIR/ops"
          cp docker-compose.server.yml "$APP_DIR/"
          cp ops/*.sh "$APP_DIR/ops/"
          chmod +x "$APP_DIR/ops/"*.sh
          cd "$APP_DIR"

          if [ ! -f .env ]; then
            echo "::error::$APP_DIR/.env introuvable. Créez-le depuis .env.server.example."
            exit 1
          fi

          NEW_TAG="sha-${SHA}"
          export BACKEND_IMAGE="ghcr.io/lamarana55/ravec-backend:${NEW_TAG}"
          export FRONTEND_IMAGE="ghcr.io/lamarana55/ravec-frontend:${NEW_TAG}"

          echo "::group::Authentification GHCR"
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin
          echo "::endgroup::"

          # 1) Capture des images en service (pour rollback auto)
          PREV_BACKEND=$(docker inspect --format '{{.Config.Image}}' ravec-pn-backend 2>/dev/null || echo "")
          PREV_FRONTEND=$(docker inspect --format '{{.Config.Image}}' ravec-pn-frontend 2>/dev/null || echo "")
          echo "Images précédentes : backend=${PREV_BACKEND:-aucune} frontend=${PREV_FRONTEND:-aucune}"

          # 2) Sauvegarde PostgreSQL AVANT déploiement
          ./ops/backup-db.sh || echo "WARN: backup échoué, on poursuit."

          # 3) Pull + up (nouvelles images, par SHA)
          docker compose -f docker-compose.server.yml --env-file .env pull backend frontend
          docker compose -f docker-compose.server.yml --env-file .env up -d --remove-orphans

          # 4) Vérification de santé → rollback auto si KO
          if ./ops/healthcheck.sh; then
            echo "$NEW_TAG" >> deploy-history.log
            echo "$NEW_TAG" > .last_successful_deploy
            docker image prune -f
            echo "✅ Déploiement réussi : $NEW_TAG"
          else
            echo "❌ Healthcheck échoué — ROLLBACK automatique"
            if [ -n "$PREV_BACKEND" ] && [ -n "$PREV_FRONTEND" ]; then
              export BACKEND_IMAGE="$PREV_BACKEND"
              export FRONTEND_IMAGE="$PREV_FRONTEND"
              docker compose -f docker-compose.server.yml --env-file .env up -d --remove-orphans
              echo "↩️  Rollback effectué : backend=$PREV_BACKEND frontend=$PREV_FRONTEND"
            else
              echo "Aucune version précédente — rollback impossible."
            fi
            exit 1
          fi

  # ════════════════════════════════════════════════════════════════════════
  #  4) NOTIFICATION (succès / échec) — résumé natif GitHub
  # ════════════════════════════════════════════════════════════════════════
  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, build, deploy]
    if: always()
    steps:
      - name: Résumé du pipeline
        run: |
          {
            echo "## 🚀 Pipeline CD — PN-RAVEC"
            echo ""
            echo "| Étape | Résultat |"
            echo "|-------|----------|"
            echo "| Tests backend  | ${{ needs.test-backend.result }} |"
            echo "| Tests frontend | ${{ needs.test-frontend.result }} |"
            echo "| Build & scan   | ${{ needs.build.result }} |"
            echo "| Déploiement    | ${{ needs.deploy.result }} |"
            echo ""
            echo "**Commit :** \`${{ github.sha }}\` par @${{ github.actor }}"
            echo "**Image :** \`ghcr.io/lamarana55/ravec-{backend,frontend}:sha-${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Marquer l'échec
        if: needs.deploy.result == 'failure' || needs.build.result == 'failure'
        run: |
          echo "::error::Pipeline en échec sur ${{ github.sha }}. Un rollback auto a été tenté si le déploiement avait démarré."
          exit 1
