name: Rollback — Production

# Rollback manuel vers une version précédente (tag sha-<commit> ou « latest »).
# Lancement : onglet Actions → Rollback — Production → Run workflow.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag à redéployer (ex: sha-<commit> ou latest). Vide = dernier déploiement réussi enregistré sur le serveur."
        required: false
        default: ""
      reason:
        description: "Raison du rollback (traçabilité)"
        required: true

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  rollback:
    name: Rollback production
    # Runner self-hosted sur le serveur de prod — rollback local.
    runs-on: [self-hosted, ravec-prod]
    environment: production
    env:
      APP_DIR: /opt/pn-ravec
      TARGET_TAG: ${{ github.event.inputs.image_tag }}
      REASON: ${{ github.event.inputs.reason }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      GHCR_USER: ${{ secrets.GHCR_USER || github.actor }}
    steps:
      - uses: actions/checkout@v4

      - name: Rollback local
        run: |
          set -euo pipefail
          # Resynchroniser les scripts ops (au cas où)
          mkdir -p "$APP_DIR/ops"
          cp docker-compose.server.yml "$APP_DIR/"
          cp ops/*.sh "$APP_DIR/ops/"
          chmod +x "$APP_DIR/ops/"*.sh
          cd "$APP_DIR"

          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

          TAG="${TARGET_TAG}"
          if [ -z "$TAG" ]; then
            TAG=$(cat .last_successful_deploy 2>/dev/null || echo "")
          fi
          if [ -z "$TAG" ]; then
            echo "::error::Aucun tag fourni et aucun dernier déploiement enregistré."
            exit 1
          fi
          echo "↩️  Rollback vers le tag : $TAG — raison : ${REASON}"
          ./ops/rollback.sh "$TAG"

      - name: Résumé
        if: always()
        run: |
          {
            echo "## ↩️ Rollback PN-RAVEC"
            echo "- Tag cible : \`${{ github.event.inputs.image_tag || 'dernier déploiement réussi' }}\`"
            echo "- Raison : ${{ github.event.inputs.reason }}"
            echo "- Déclenché par : @${{ github.actor }}"
          } >> "$GITHUB_STEP_SUMMARY"
