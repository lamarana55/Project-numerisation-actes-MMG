name: CI — Tests & Qualité

# Tests sur toute Pull Request vers main ET sur tout push (sauf main, géré par le CD
# qui rejoue les tests avant de déployer). Objectif : aucun code non testé ne fusionne.
on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

# Annule les exécutions précédentes encore en cours sur la même branche.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Backend (Spring Boot / Maven) ────────────────────────────────────────
  backend-test:
    name: Backend — Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: ravec_test
          POSTGRES_USER: ravec_user
          POSTGRES_PASSWORD: ravec_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Tests backend
        working-directory: ./backend
        env:
          DATABASE_IP: localhost
          DATABASE_PORT: 5432
          DATABASE: ravec_test
          DATABASE_USER: ravec_user
          DATABASE_PASSWORD: ravec_test_pass
          DDL_AUTO: create-drop
          # Tests = base vierge + schéma géré par Hibernate (create-drop).
          # Flyway désactivé : son baseline pg_dump cible une base existante (prod)
          # et n'est pas rejouable sur une base vide.
          SPRING_FLYWAY_ENABLED: false
          JWT_SECURITY: ci_test_jwt_secret_key_32chars_minimum_xx
          SERVER_PORT: 8091
          FRONT_URL: http://localhost:4200
          SPRING_MAIL_USERNAME: test@test.com
          SPRING_MAIL_PASSWORD: test
        run: mvn -B --no-transfer-progress clean test

      - name: Publier les rapports de test
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/target/surefire-reports/
          if-no-files-found: ignore

  # ── Frontend (Angular / Karma) ───────────────────────────────────────────
  frontend-test:
    name: Frontend — Tests & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      # Tests unitaires : NON bloquants. Le projet ne maintient que des specs
      # Angular CLI par défaut ; le vrai garde-fou frontend est le build de
      # production ci-dessous. (Rendre bloquant si une vraie suite est ajoutée.)
      - name: Tests unitaires (rapport, non bloquant)
        working-directory: ./frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless --no-progress || echo "::warning::Tests unitaires frontend en échec (non bloquant)"

      - name: Build production (garde-fou bloquant)
        working-directory: ./frontend
        run: npm run build -- --configuration production

  # ── Lint frontend (non bloquant) ─────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps
      - name: Lint
        working-directory: ./frontend
        run: npx ng lint --no-progress || true
