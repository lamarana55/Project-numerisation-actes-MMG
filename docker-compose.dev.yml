version: '3.8'

# ============================================================
#  ravec-num — Docker Compose DÉVELOPPEMENT (hot-reload activé)
# ============================================================

services:

  # ──────────────────────────────────────────
  #  PostgreSQL
  # ──────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ravec-num-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE:-db_numerisation}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE:-db_numerisation}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ravec-num-network-dev

  # ──────────────────────────────────────────
  #  Backend Spring Boot — HOT RELOAD via spring-boot-devtools
  #  Le code source est monté en volume.
  #  Un watcher Maven recompile à chaque changement.
  # ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ravec-num-backend-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_IP: postgres
      DATABASE_PORT: 5432
      DATABASE: ${DATABASE:-db_numerisation}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      DDL_AUTO: ${DDL_AUTO:-update}
      SERVER_PORT: 8091
      FRONT_URL: ${FRONT_URL:-http://localhost:4200}
      JWT_SECURITY: ${JWT_SECURITY:-dev_secret_key_change_in_prod}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-}
      NPI_SERVICE_URL: http://generation-npi:8092/api/v1
      NPI_SERVICE_USERNAME: ${NPI_SERVICE_USERNAME:-superadmin@ravec.gov.gn}
      NPI_SERVICE_PASSWORD: ${NPI_SERVICE_PASSWORD:-ChangeMe2026!}
      # Active Spring DevTools
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
      SPRING_DEVTOOLS_LIVERELOAD_ENABLED: "true"
    ports:
      - "${SERVER_PORT:-8091}:8091"
      # Port LiveReload DevTools (interne uniquement, pas exposé sur l'hôte)
    volumes:
      # Monte tout le code source backend dans le container
      - ./backend/src:/app/src
      - ./backend/pom.xml:/app/pom.xml
      # Cache Maven pour ne pas retélécharger les dépendances à chaque rebuild
      - maven_cache:/root/.m2
    networks:
      - ravec-num-network-dev

  # ──────────────────────────────────────────
  #  GenerationNPI — HOT RELOAD via spring-boot-devtools
  # ──────────────────────────────────────────
  generation-npi:
    build:
      context: ./GenerationNPI
      dockerfile: Dockerfile.dev
    container_name: ravec-num-generation-npi-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_IP: postgres
      DATABASE_PORT: 5432
      DATABASE: ${DATABASE:-db_numerisation}
      DATABASE_USER: ${DATABASE_USER:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      SERVER_PORT: 8092
      FRONT_URL: ${FRONT_URL:-http://localhost:4200}
      JWT_SECURITY: ${JWT_SECURITY:-dev_secret_key_change_in_prod}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400}
      NPI_QUOTA_MENSUEL: ${NPI_QUOTA_MENSUEL:-10000}
      SPRING_DEVTOOLS_RESTART_ENABLED: "true"
    ports:
      - "${NPI_SERVER_PORT:-8092}:8092"
    volumes:
      - ./GenerationNPI/src:/app/src
      - ./GenerationNPI/pom.xml:/app/pom.xml
      - maven_cache:/root/.m2
    networks:
      - ravec-num-network-dev

  # ──────────────────────────────────────────
  #  Frontend Angular — HOT RELOAD via ng serve --poll
  # ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ravec-num-frontend-dev
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    environment:
      - BACKEND_URL=http://backend:8091/api/v1
    volumes:
      # Monte le code source Angular (hot-reload)
      - ./frontend/src:/app/src
      - ./frontend/angular.json:/app/angular.json
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      # node_modules isolé dans le container (ne pas monter depuis le host)
      - /app/node_modules
    networks:
      - ravec-num-network-dev

  # ──────────────────────────────────────────
  #  PgAdmin (optionnel) — accès via profil "tools"
  #  Démarrer avec : docker compose --profile tools up
  # ──────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ravec-num-pgadmin-dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ravec-num.gov.gn}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data_dev:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - ravec-num-network-dev
    profiles:
      - tools

volumes:
  postgres_data_dev:
    driver: local
  pgadmin_data_dev:
    driver: local
  maven_cache:
    driver: local

networks:
  ravec-num-network-dev:
    driver: bridge