# ============================================================
#  Docker Compose — PRODUCTION (serveur Ubuntu unique)
#  Source UNIQUE de déploiement (remplace docker-compose.prod.yml / .yml).
#
#  Images injectées par variables (déploiement déterministe par SHA) :
#    BACKEND_IMAGE / FRONTEND_IMAGE   (def. : tag latest)
#
#  Lancement :
#    BACKEND_IMAGE=...:sha-xxx FRONTEND_IMAGE=...:sha-xxx \
#      docker compose -f docker-compose.server.yml --env-file .env up -d
#
#  Le pipeline GitHub Actions (cd.yml) gère pull + up + healthcheck + rollback.
# ============================================================

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ravec-pn-postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB:       ${DATABASE:-ravec_db}
      POSTGRES_USER:     ${DATABASE_USER:-ravec_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD requis}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - ravec_pn_postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"                      # interne au réseau Docker uniquement
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-ravec_user} -d ${DATABASE:-ravec_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ravec-pn-network

  # ── Backend Spring Boot ──────────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/lamarana55/ravec-backend:latest}
    container_name: ravec-pn-backend
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_IP:       postgres
      DATABASE_PORT:     5432
      DATABASE:          ${DATABASE:-ravec_db}
      DATABASE_USER:     ${DATABASE_USER:-ravec_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD requis}
      DDL_AUTO:          ${DDL_AUTO:-validate}
      SERVER_PORT:       8091
      FRONT_URL:         ${FRONT_URL}
      JWT_SECURITY:      ${JWT_SECURITY:?JWT_SECURITY requis}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      NIMBASMS_SERVICE_ID:  ${NIMBASMS_SERVICE_ID:-}
      NIMBASMS_SECRET_TOKEN: ${NIMBASMS_SECRET_TOKEN:-}
      NIMBASMS_SENDER_NAME: ${NIMBASMS_SENDER_NAME:-PN RAVEC}
      JAVA_OPTS: -Xms512m -Xmx1024m -XX:+UseG1GC -XX:+UseContainerSupport
    expose:
      - "8091"                      # interne au réseau Docker uniquement
    volumes:
      - ravec_pn_backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8091/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - ravec-pn-network

  # ── Frontend Angular (Nginx : statique + proxy /api → backend) ───────────
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/lamarana55/ravec-frontend:latest}
    container_name: ravec-pn-frontend
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      backend:
        condition: service_healthy
    ports:
      # Exposé seulement en local ; le Nginx/Certbot de l'hôte gère le TLS.
      - "127.0.0.1:8082:80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - ravec-pn-network

  # ── PgAdmin (optionnel — profil "tools") ─────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ravec-pn-pgadmin
    restart: unless-stopped
    logging: *default-logging
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL:-admin@ravec.gov.gn}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?PGADMIN_PASSWORD requis}
      PGADMIN_LISTEN_PORT:      80
    ports:
      - "127.0.0.1:5051:80"
    volumes:
      - ravec_pn_pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - ravec-pn-network
    profiles:
      - tools

volumes:
  ravec_pn_postgres_data:
    driver: local
  ravec_pn_backend_logs:
    driver: local
  ravec_pn_pgadmin_data:
    driver: local

networks:
  ravec-pn-network:
    driver: bridge
