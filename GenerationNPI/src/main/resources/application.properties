spring.application.name=GenerationNPI
server.port=${SERVER_PORT:8092}
server.servlet.context-path=/api/v1

spring.config.import=optional:file:.env[.properties]

# ===== PostgreSQL (même instance que RAVEC) =====
spring.datasource.url=jdbc:postgresql://${DATABASE_IP:localhost}:${DATABASE_PORT:5433}/${DATABASE:db_numerisation}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# ===== Flyway =====
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ===== JWT =====
ravec.app.jwtSecret=${JWT_SECURITY}
ravec.app.jwtExpiration=${JWT_EXPIRATION:86400}

# ===== CORS =====
ravec.app.frontend.url=${FRONT_URL:http://localhost:4200}

# ===== NPI Quota =====
ravec.npi.quota-mensuel=${NPI_QUOTA_MENSUEL:10000}

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized
management.health.mail.enabled=false

info.app.name=GenerationNPI
info.app.description=Service de génération NPI - PN-RAVEC
info.app.version=1.0.0

# ===== Swagger =====
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# ===== Logs =====
logging.level.root=INFO
logging.level.gov.ravec.generation=DEBUG
logging.file.name=logs/generation-npi.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
